name: Deploy Algoduck Spring App to EC2

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      triggerReason:
        description: "Why are you manually deploying?"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate application.yml from template
        run: |
          cp src/main/resources/application.yml.template src/main/resources/application.yml
          envsubst < src/main/resources/application.yml > src/main/resources/tmp.yml
          mv src/main/resources/tmp.yml src/main/resources/application.yml
        env:
          DATASOURCE_URL: jdbc:mysql://${{ secrets.EC2_DB_HOST }}:3306/${{ secrets.DB_NAME }}?serverTimezone=Asia/Seoul
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_TESTCASE_BUCKET_NAME: ${{ secrets.S3_TESTCASE_BUCKET_NAME }}
          S3_SUBMISSION_BUCKET_NAME: ${{ secrets.S3_SUBMISSION_BUCKET_NAME }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}
          EC2_DB_HOST: ${{ secrets.EC2_DB_HOST }}
          EC2_JUDGE_HOST: ${{ secrets.EC2_JUDGE_HOST }}
          CLIENT_DOMAIN_NAME: ${{ secrets.CLIENT_DOMAIN_NAME }}
          JUDGE_DOMAIN_NAME: ${{ secrets.JUDGE_DOMAIN_NAME }}

      - name: Generate .env from template
        run: |
          cp .env.template .env.template.generated
          envsubst < .env.template.generated > .env
          chmod 600 .env
        env:
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          S3_SUBMISSION_BUCKET_NAME: ${{ secrets.S3_SUBMISSION_BUCKET_NAME }}
          S3_TESTCASE_BUCKET_NAME: ${{ secrets.S3_TESTCASE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}
          EC2_DB_HOST: ${{ secrets.EC2_DB_HOST }}
          EC2_JUDGE_HOST: ${{ secrets.EC2_JUDGE_HOST }}
          CLIENT_DOMAIN_NAME: ${{ secrets.CLIENT_DOMAIN_NAME }}
          JUDGE_DOMAIN_NAME: ${{ secrets.JUDGE_DOMAIN_NAME }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: |
            build/libs/*.jar,
            Dockerfile,
            docker-compose.yml,
            .env
          target: "~/algoduck"

      - name: Run Spring app on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/algoduck

            echo "📦 컨테이너 ID 확인 및 로그 백업 준비"
            CONTAINER_ID=$(docker ps -a -q --filter "name=^/algoduck$")
            if [ -n "$CONTAINER_ID" ]; then
              TIMESTAMP=$(date +%Y%m%d_%H%M%S)
              LOG_SRC="/var/lib/docker/containers/${CONTAINER_ID}/${CONTAINER_ID}-json.log"
              LOG_DEST_DIR=~/docker-container-log-backup
              mkdir -p "$LOG_DEST_DIR"
              cp "$LOG_SRC" "$LOG_DEST_DIR/algoduck-${TIMESTAMP}.json.log" || echo "❗ 로그 백업 실패: $LOG_SRC"
            else
              echo "❗ 기존 컨테이너가 존재하지 않아 백업 생략"
            fi

            echo "🧹 기존 Spring 앱 컨테이너 중지 및 삭제"
            docker stop algoduck || true
            docker rm algoduck || true

            echo "🚀 Spring 앱 컨테이너 빌드 및 실행"
            docker-compose up -d --build app

            echo "🔒 .env 파일 권한 설정"
            chmod 600 .env

      - name: Health Check
        run: |
          echo "🔍 서버 Health Check 시작"
          for i in {1..10}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}:8080/actuator/health || true)
            if [ "$status" == "200" ]; then
              echo "✅ 서버 정상 작동 (HTTP 200)"
              exit 0
            fi
            echo "⏳ 서버 대기 중... (현재 상태: $status)"
            sleep 5
          done
          echo "❌ 서버 Health Check 실패"
          exit 1
