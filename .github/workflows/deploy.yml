name: Deploy Algoduck to EC2 with Docker Compose

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate application.yml from template
        run: |
          cp src/main/resources/application.yml.template src/main/resources/application.yml
          envsubst < src/main/resources/application.yml > src/main/resources/tmp.yml
          mv src/main/resources/tmp.yml src/main/resources/application.yml
        env:
          DATASOURCE_URL: jdbc:mysql://mysql-container:3306/${{ secrets.DB_NAME }}?serverTimezone=Asia/Seoul
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_TESTCASE_BUCKET_NAME: ${{ secrets.S3_TESTCASE_BUCKET_NAME }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}

      - name: Generate .env from template
        run: |
          cp .env.template .env.template.generated
          envsubst < .env.template.generated > .env
        env:
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          S3_TESTCASE_BUCKET_NAME: ${{ secrets.S3_TESTCASE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: |
            build/libs/*.jar,
            Dockerfile,
            docker-compose.yml,
            .env
          target: "~/algoduck"

      - name: Run docker-compose on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/algoduck

            echo "[1] 이전 컨테이너 및 이미지 정리"
            docker compose down || true
            docker stop algoduck mysql-container || true
            docker rm algoduck mysql-container || true

            echo "[2] 도커 네트워크 및 볼륨 정리 (옵션)"
            docker network prune -f || true
            docker volume prune -f || true

            echo "[3] 컨테이너 백그라운드 실행"
            docker compose up -d --build

            echo "[4] 컨테이너 로그 출력 (10초 대기)"
            sleep 10
            docker compose logs > ~/algoduck-deploy.log || true
