name: Deploy Algoduck to EC2

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate application.yml from template
        run: |
          cp src/main/resources/application.yml.template src/main/resources/application.yml
          envsubst < src/main/resources/application.yml > src/main/resources/tmp.yml
          mv src/main/resources/tmp.yml src/main/resources/application.yml
        env:
          DATASOURCE_URL: ${{ secrets.DATASOURCE_URL }}
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}

      - name: Check generated application.yml (디버그용 출력)
        run: cat src/main/resources/application.yml

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Copy JAR and Dockerfile to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar,Dockerfile"
          target: "~/algoduck"

      - name: SSH into EC2 and run Docker commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/algoduck
            docker stop algoduck || true && docker rm algoduck || true
            docker rmi algoduck-app || true
            docker build -t algoduck-app .
            docker run -d -p 8080:8080 --name algoduck algoduck-app
