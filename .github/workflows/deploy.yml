name: Deploy Algoduck to EC2

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Generate application.yml
        run: |
          cp src/main/resources/application.yml.template src/main/resources/application.yml
          envsubst < src/main/resources/application.yml > src/main/resources/tmp.yml
          mv src/main/resources/tmp.yml src/main/resources/application.yml
        env:
          DATASOURCE_URL: jdbc:mysql://mysql-container:3306/${{ secrets.DB_NAME }}?serverTimezone=Asia/Seoul
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_TESTCASE_BUCKET_NAME: ${{ secrets.S3_TESTCASE_BUCKET_NAME }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}

      - name: Generate .env file
        run: |
          cp .env.template .env
          envsubst < .env > .env.generated
          mv .env.generated .env
        env:
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER_NAME: ${{ secrets.DB_USER_NAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
          S3_PROFILE_BUCKET_NAME: ${{ secrets.S3_PROFILE_BUCKET_NAME }}
          S3_TESTCASE_BUCKET_NAME: ${{ secrets.S3_TESTCASE_BUCKET_NAME }}
          DEFAULT_PROFILE_URL: ${{ secrets.DEFAULT_PROFILE_URL }}

      - name: Build Spring Boot JAR
        run: ./gradlew clean build

      - name: Upload to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: |
            build/libs/*.jar,
            Dockerfile,
            docker-compose.yml,
            .env
          target: "~/algoduck"

      - name: Deploy with docker-compose on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/algoduck
            docker compose down || true
            docker stop algoduck mysql-container || true
            docker rm algoduck mysql-container || true
            docker compose up -d --build
